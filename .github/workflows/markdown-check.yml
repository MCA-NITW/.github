name: Reusable Markdown Check

# For docs-only repos (Academic, etc).
# - Lints Markdown with markdownlint
# - Checks dead links with lychee
#
# Usage:
#   jobs:
#     docs:
#       uses: mca-nitw/.github/.github/workflows/markdown-check.yml@main

on:
  workflow_call:
    inputs:
      glob:
        description: Files markdownlint should check
        required: false
        type: string
        default: "**/*.md"
      check-links:
        description: Whether to run lychee dead-link check
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  issues: write

jobs:
  markdownlint:
    name: Markdownlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@8de2aa07cae85fd17c0b35642db70cf5495f1d25 # v24.0.0
        with:
          globs: ${{ inputs.glob }}
        continue-on-error: true

  lychee:
    name: Dead-link check
    runs-on: ubuntu-latest
    if: inputs.check-links
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Run lychee
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2
        with:
          args: --no-progress --max-concurrency 4 --exclude-mail .
          fail: false
