name: 🏷️ Label Management

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/label-management.yml'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  create-labels:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Create or Update Labels
        uses: actions/github-script@v8
        with:
          script: |
            const labels = [
              {
                name: 'join-request',
                color: '0052cc',
                description: 'Request to join the organization'
              },
              {
                name: 'invite-sent',
                color: '28a745',
                description: 'Organization invitation has been sent'
              },
              {
                name: 'invite-failed',
                color: 'd73a49',
                description: 'Failed to send organization invitation'
              },
              {
                name: 'pending-review',
                color: 'fbca04',
                description: 'Join request requires manual review'
              },
              {
                name: 'approved',
                color: '2ea043',
                description: 'Join request has been approved'
              },
              {
                name: 'member-joined',
                color: '7057ff',
                description: 'User has successfully joined the organization'
              }
            ];

            let failed = 0;

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name
                });

                await github.rest.issues.updateLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  color: label.color,
                  description: label.description
                });

                core.info(`Updated label: ${label.name}`);
              } catch (error) {
                if (error.status === 404) {
                  try {
                    await github.rest.issues.createLabel({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      name: label.name,
                      color: label.color,
                      description: label.description
                    });
                    core.info(`Created label: ${label.name}`);
                  } catch (createError) {
                    failed++;
                    core.error(`Failed to create label ${label.name}: ${createError.message}`);
                  }
                } else {
                  failed++;
                  core.error(`Failed to manage label ${label.name}: ${error.message}`);
                }
              }
            }

            if (failed > 0) {
              core.setFailed(`${failed} label operation(s) failed`);
            }
